<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calorie Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div
      class="min-h-screen flex items-center justify-center px-4 py-10 bg-gradient-to-br from-slate-900 via-slate-950 to-slate-900"
    >
      <div
        class="w-full max-w-3xl bg-slate-900/80 backdrop-blur-md rounded-2xl shadow-2xl shadow-black/50 border border-slate-800 overflow-hidden"
      >
        <header
          class="px-6 sm:px-8 py-6 border-b border-slate-800 bg-gradient-to-r from-emerald-500/20 via-sky-500/10 to-purple-500/20"
        >
          <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">
            Calorie Counter
          </h1>
          <p class="mt-1 text-sm text-slate-300">
            Add your meals and snacks track calories and stay on top of your
            daily goals.
          </p>
        </header>

        <main class="px-6 sm:px-8 py-6 space-y-6">
          <section
            class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3"
          >
            <div>
              <p class="text-xs uppercase tracking-[0.2em] text-slate-400">
                Total Calories Today
              </p>
              <p
                id="totalCalories"
                class="mt-1 text-3xl font-semibold text-emerald-400 drop-shadow-[0_0_12px_rgba(16,185,129,0.45)]"
              >
                0 kcal
              </p>
              <p id="goalInfo" class="mt-1 text-xs text-slate-400">
                Goal: <span id="goalValue">2000</span> kcal •
                <span id="goalProgressLabel">0%</span> of goal
              </p>
              <div class="mt-3 w-full max-w-xs">
                <div
                  class="h-2 w-full rounded-full bg-slate-800 overflow-hidden"
                >
                  <div
                    id="goalProgressBar"
                    class="h-full w-0 bg-gradient-to-r from-emerald-400 via-sky-400 to-purple-400 transition-all duration-500"
                  ></div>
                </div>
              </div>
            </div>

            <div class="flex items-center gap-3 self-stretch sm:self-auto">
              <button
                id="resetButton"
                class="flex-1 sm:flex-none inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium bg-slate-900 border border-slate-700 text-slate-100 hover:bg-slate-800 hover:border-slate-500 active:scale-[0.97] transition"
                type="button"
              >
                Reset Day
              </button>

              <button
                id="setGoalButton"
                class="flex-1 sm:flex-none inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium bg-emerald-500 text-slate-950 hover:bg-emerald-400 active:scale-[0.97] shadow-lg shadow-emerald-500/30 transition"
                type="button"
              >
                Set Goal
              </button>
            </div>
          </section>

          <section
            class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4 sm:p-5 space-y-4"
          >
            <div class="flex items-center justify-between gap-2">
              <h2 class="text-sm font-semibold text-slate-100 tracking-tight">
                Add Food Item
              </h2>
              <button
                id="fetchExampleButton"
                type="button"
                class="inline-flex items-center gap-1.5 text-xs font-medium text-sky-300 hover:text-sky-200"
              >
                Suggest calories
                <span
                  class="inline-flex h-4 w-4 items-center justify-center rounded-full border border-sky-500/60 text-[0.6rem]"
                  >API</span
                >
              </button>
            </div>

            <form
              id="foodForm"
              class="grid grid-cols-1 sm:grid-cols-[minmax(0,2fr)_minmax(0,1fr)_auto] gap-3"
            >
              <div>
                <label
                  for="foodName"
                  class="block text-xs font-medium text-slate-300 mb-1"
                  >Food name</label
                >
                <input
                  id="foodName"
                  name="foodName"
                  type="text"
                  required
                  placeholder="e.g. Grilled chicken sandwich"
                  class="w-full rounded-xl border border-slate-700 bg-slate-900/90 px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/70 focus:border-transparent"
                />
              </div>

              <div>
                <label
                  for="calories"
                  class="block text-xs font-medium text-slate-300 mb-1"
                  >Calories (kcal)</label
                >
                <input
                  id="calories"
                  name="calories"
                  type="number"
                  min="0"
                  step="1"
                  required
                  placeholder="e.g. 450"
                  class="w-full rounded-xl border border-slate-700 bg-slate-900/90 px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/70 focus:border-transparent"
                />
              </div>

              <div
                class="flex items-end sm:items-center gap-2 sm:gap-3 justify-end mt-1 sm:mt-0"
              >
                <button
                  type="submit"
                  class="inline-flex items-center justify-center px-4 py-2.5 rounded-xl text-sm font-medium bg-emerald-500 text-slate-950 hover:bg-emerald-400 active:scale-[0.97] shadow-lg shadow-emerald-500/30 transition w-full sm:w-auto"
                >
                  Add
                </button>
              </div>
            </form>

            <p id="formMessage" class="text-xs text-rose-400 hidden"></p>
          </section>

          <!-- Food List -->
          <section
            class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4 sm:p-5"
          >
            <div class="flex items-center justify-between gap-2 mb-3">
              <h2 class="text-sm font-semibold text-slate-100 tracking-tight">
                Today&apos;s Foods
              </h2>
              <p
                id="itemsSummary"
                class="text-xs font-medium text-slate-400"
              ></p>
            </div>

            <ul
              id="foodList"
              class="space-y-2 max-h-72 overflow-y-auto pr-1 scrollbar-thin scrollbar-thumb-slate-700 scrollbar-track-slate-900"
            ></ul>

            <p id="emptyState" class="text-xs text-slate-400 mt-1">
              No items yet. Add your first meal above.
            </p>
          </section>
            </span>
          </section>
        </main>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
